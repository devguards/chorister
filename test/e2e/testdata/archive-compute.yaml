apiVersion: chorister.dev/v1alpha1
kind: ChoCompute
metadata:
  name: api
spec:
  image: nginx:latest
  replicas: 1
  port: 8080
  variant: long-running
  env:
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: payments--database--archive-db-credentials
          key: url
