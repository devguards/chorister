apiVersion: v1
kind: Pod
metadata:
  name: echo-api
  namespace: e2e-netiso-auth
  labels:
    app: echo-api
spec:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: echo
      image: busybox:latest
      command: ["sh", "-c", "while true; do echo -e 'HTTP/1.1 200 OK\r\n\r\nok' | nc -l -p 8080; done"]
      ports:
        - containerPort: 8080
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: echo-api
  namespace: e2e-netiso-auth
spec:
  selector:
    app: echo-api
  ports:
    - port: 8080
      targetPort: 8080
