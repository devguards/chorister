apiVersion: chorister.dev/v1alpha1
kind: ChoApplication
metadata:
  name: e2e-egress-fqdn
  namespace: cho-system
spec:
  owners:
    - test@chorister.dev
  policy:
    compliance: essential
    promotion:
      requiredApprovers: 1
      allowedRoles: ["org-admin"]
    network:
      egress:
        allowlist:
          - host: api.stripe.com
            port: 443
            criticality: high
  domains:
    - name: payments
---
apiVersion: chorister.dev/v1alpha1
kind: ChoNetwork
metadata:
  name: payments-egress
  namespace: e2e-egress-fqdn-payments
spec:
  application: e2e-egress-fqdn
  domain: payments
  egress:
    allowlist:
      - api.stripe.com
