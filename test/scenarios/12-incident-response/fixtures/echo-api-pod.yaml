apiVersion: v1
kind: Pod
metadata:
  name: echo-api
  labels:
    app: echo-api
spec:
  containers:
    - name: echo-api
      image: chorister-scenario/echo-api:latest
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 8080
      readinessProbe:
        httpGet:
          path: /healthz
          port: 8080
        initialDelaySeconds: 2
        periodSeconds: 5
