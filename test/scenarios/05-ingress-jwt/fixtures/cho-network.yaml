apiVersion: chorister.dev/v1alpha1
kind: ChoNetwork
metadata:
  name: payments-ingress
spec:
  application: scen05-myapp
  domain: payments
  ingress:
    from: internet
    port: 443
    auth:
      jwt:
        issuer: https://test.chorister.dev
        jwksUri: http://mock-jwks.cho-system.svc.cluster.local:8080/jwks
    routes:
      /api/*: {}
      /healthz:
        auth: none
