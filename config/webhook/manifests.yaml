---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-chorister-dev-v1alpha1-choapplication
  failurePolicy: Fail
  name: vchoapplication-v1alpha1.kb.io
  rules:
  - apiGroups:
    - chorister.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - choapplications
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-chorister-dev-v1alpha1-chodomainmembership
  failurePolicy: Fail
  name: vchodomainmembership-v1alpha1.kb.io
  rules:
  - apiGroups:
    - chorister.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - chodomainmemberships
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-chorister-dev-v1alpha1-chonetwork
  failurePolicy: Fail
  name: vchonetwork-v1alpha1.kb.io
  rules:
  - apiGroups:
    - chorister.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - chonetworks
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-chorister-dev-v1alpha1-chopromotionrequest
  failurePolicy: Fail
  name: vchopromotionrequest-v1alpha1.kb.io
  rules:
  - apiGroups:
    - chorister.dev
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - chopromotionrequests
  sideEffects: None
