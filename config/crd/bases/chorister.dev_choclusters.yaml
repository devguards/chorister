---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: choclusters.chorister.dev
spec:
  group: chorister.dev
  names:
    kind: ChoCluster
    listKind: ChoClusterList
    plural: choclusters
    singular: chocluster
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ChoCluster is the Schema for the choclusters API.
          It bootstraps the full operator stack and defines cluster-wide configuration.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ChoClusterSpec defines the desired state of ChoCluster.
            properties:
              cloudProvider:
                description: cloudProvider configures the cloud provider plugin for
                  object storage via kro.
                properties:
                  image:
                    description: image overrides the default cloud provider controller
                      image.
                    type: string
                  provider:
                    description: provider is the cloud provider.
                    enum:
                    - aws
                    - gcp
                    - azure
                    type: string
                  region:
                    description: region is the default region for cloud resources.
                    type: string
                required:
                - provider
                type: object
              clusters:
                description: |-
                  clusters defines remote clusters for multi-cluster deployments.
                  Each entry registers a cluster with a role and a kubeconfig Secret reference.
                  When empty, the controller operates in single-cluster mode (all resources on the home cluster).
                items:
                  description: ClusterRegistryEntry defines a registered remote cluster
                    for multi-cluster deployments.
                  properties:
                    name:
                      description: name is the cluster identifier (e.g. "sandbox-pool",
                        "prod-cell-1").
                      type: string
                    role:
                      description: role is the cluster's purpose.
                      enum:
                      - sandbox
                      - production
                      type: string
                    secretRef:
                      description: |-
                        secretRef is the name of a Secret in cho-system containing a 'kubeconfig' key
                        with the kubeconfig for the remote cluster.
                      type: string
                  required:
                  - name
                  - role
                  - secretRef
                  type: object
                type: array
              controllerRevision:
                description: controllerRevision is the current stable controller revision
                  name.
                type: string
              externalSecretBackend:
                description: externalSecretBackend configures the external secret
                  backend for production environments.
                properties:
                  provider:
                    description: provider is the external secret backend provider.
                    enum:
                    - gcp
                    - aws
                    - azure
                    type: string
                  secretStoreRef:
                    description: secretStoreRef is the name of the ClusterSecretStore
                      or SecretStore to use.
                    type: string
                required:
                - provider
                - secretStoreRef
                type: object
              finops:
                description: finops defines cost estimation configuration.
                properties:
                  rates:
                    description: rates defines per-unit cost rates.
                    properties:
                      cpuPerHour:
                        anyOf:
                        - type: integer
                        - type: string
                        description: cpuPerHour is the cost per CPU core per hour.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      memoryPerGBHour:
                        anyOf:
                        - type: integer
                        - type: string
                        description: memoryPerGBHour is the cost per GB memory per
                          hour.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      postgresLarge:
                        anyOf:
                        - type: integer
                        - type: string
                        description: postgresLarge is the flat monthly rate for a
                          large PostgreSQL instance.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      postgresMedium:
                        anyOf:
                        - type: integer
                        - type: string
                        description: postgresMedium is the flat monthly rate for a
                          medium PostgreSQL instance.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      postgresSmall:
                        anyOf:
                        - type: integer
                        - type: string
                        description: postgresSmall is the flat monthly rate for a
                          small PostgreSQL instance.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                      storagePerGBMonth:
                        anyOf:
                        - type: integer
                        - type: string
                        description: storagePerGBMonth is the cost per GB storage
                          per month.
                        pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                        x-kubernetes-int-or-string: true
                    type: object
                type: object
              observability:
                description: observability defines the observability stack configuration.
                properties:
                  enabled:
                    description: enabled controls whether the observability stack
                      is deployed. Defaults to true.
                    type: boolean
                  monitoringNamespace:
                    default: cho-monitoring
                    description: monitoringNamespace is the namespace where observability
                      components are deployed.
                    type: string
                  retention:
                    description: retention defines data retention policies.
                    properties:
                      logs:
                        description: logs retention period (e.g. "14d"). Defaults
                          to 14d.
                        type: string
                      metrics:
                        description: metrics retention period (e.g. "30d"). Defaults
                          to 30d.
                        type: string
                      traces:
                        description: traces retention period (e.g. "7d"). Defaults
                          to 7d.
                        type: string
                    type: object
                  versions:
                    description: versions specifies component versions for the observability
                      stack.
                    properties:
                      alloy:
                        type: string
                      grafana:
                        type: string
                      loki:
                        type: string
                      mimir:
                        type: string
                      tempo:
                        type: string
                    type: object
                type: object
              operators:
                description: operators defines the operators to install and their
                  versions.
                properties:
                  certManager:
                    type: string
                  dragonfly:
                    type: string
                  gatekeeper:
                    type: string
                  kro:
                    type: string
                  nats:
                    type: string
                  stackgres:
                    type: string
                  tetragon:
                    type: string
                type: object
              revisions:
                description: revisions defines the blue-green controller revisions
                  for upgrades.
                items:
                  description: ControllerRevisionEntry defines a named controller
                    revision with a tag.
                  properties:
                    name:
                      description: name is the revision identifier (e.g. "1-4", "1-5").
                      type: string
                    tag:
                      description: tag is the revision tag (e.g. "stable", "canary").
                      type: string
                  required:
                  - name
                  - tag
                  type: object
                type: array
              sizingTemplates:
                additionalProperties:
                  description: SizingTemplateSet defines named sizing templates for
                    a resource type.
                  properties:
                    templates:
                      additionalProperties:
                        description: SizingTemplate defines resource allocations for
                          a named size.
                        properties:
                          cpu:
                            anyOf:
                            - type: integer
                            - type: string
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          instances:
                            description: instances is the number of database instances
                              (e.g. 1 for single, 2+ for HA).
                            format: int32
                            type: integer
                          memory:
                            anyOf:
                            - type: integer
                            - type: string
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                          replicas:
                            description: replicas is the number of queue/cache replicas.
                            format: int32
                            type: integer
                          storage:
                            anyOf:
                            - type: integer
                            - type: string
                            pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                            x-kubernetes-int-or-string: true
                        type: object
                      description: templates maps size names (e.g. "small", "medium",
                        "large") to resource definitions.
                      type: object
                  required:
                  - templates
                  type: object
                description: sizingTemplates defines named resource sizing templates.
                type: object
            type: object
          status:
            description: ChoClusterStatus defines the observed state of ChoCluster.
            properties:
              cisBenchmark:
                description: cisBenchmark stores the latest kube-bench results.
                type: string
              clusterConnectivity:
                additionalProperties:
                  type: string
                description: |-
                  clusterConnectivity tracks the status of each registered remote cluster.
                  Key is the cluster name, value is the connectivity status (e.g. "Connected", "Unreachable").
                type: object
              conditions:
                description: conditions represent the current state of the ChoCluster.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observabilityReady:
                description: observabilityReady indicates whether the monitoring stack
                  is operational.
                type: boolean
              operatorStatus:
                additionalProperties:
                  type: string
                description: operatorStatus tracks the status of each managed operator.
                type: object
              phase:
                description: phase is the cluster lifecycle state.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
